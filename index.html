<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1612;
      --gold: #c9a86c;
      --muted: #8a7f72;
    }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.5;
    }

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeIn 1.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .frame {
      position: relative;
      width: min(420px, 88vw);
    }

    /* Decorative corner lines */
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 2;
    }
    .frame::before { top: -8px; left: -8px; border-width: 1px 0 0 1px; }
    .frame::after  { bottom: -8px; right: -8px; border-width: 0 1px 1px 0; }

    .frame img {
      display: block;
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: contrast(1.04) saturate(0.92);
      transition: filter 0.6s ease;
    }
    .frame img:hover { filter: contrast(1.02) saturate(1.05); }

    /* Thin gold line accent */
    .accent-line {
      width: 48px;
      height: 1px;
      background: var(--gold);
      opacity: 0.7;
      animation: expandLine 1s 0.6s ease both;
    }
    @keyframes expandLine {
      from { width: 0; opacity: 0; }
      to   { width: 48px; opacity: 0.7; }
    }

    .caption {
      text-align: center;
      letter-spacing: 0.18em;
      font-size: 0.65rem;
      font-weight: 200;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeIn 1.6s 0.4s ease both;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
      letter-spacing: 0.04em;
      text-align: center;
      animation: fadeIn 1.4s 0.2s ease both;
    }
  </style>
</head>
<body>
  <div class="stage">
    <p class="caption">Portrait</p>
    <h1 class="title">Elegance</h1>
    <div class="accent-line"></div>
    <div class="frame">
      <img src="./photo.jpg" alt="Portrait" />
    </div>
    <p class="caption">2026 &nbsp;·&nbsp; Studio</p>
  </div>
</body>
</html>
